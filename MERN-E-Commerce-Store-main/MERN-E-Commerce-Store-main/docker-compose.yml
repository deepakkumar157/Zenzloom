version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: zenzloom-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - zenzloom-network

  # MERN E-Commerce Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenzloom-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/huxnStore
      - JWT_SECRET=zenzloom_jwt_secret_key_2024
      - NODE_ENV=production
    depends_on:
      - mongodb
    volumes:
      - uploads_data:/app/backend/uploads
    networks:
      - zenzloom-network

volumes:
  mongodb_data:
  uploads_data:

networks:
  zenzloom-network:
    driver: bridge
